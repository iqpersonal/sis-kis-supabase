<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Update Form — Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: linear-gradient(135deg, #f0f4ff 0%, #e8f5e9 100%); font-family: 'Segoe UI', Tahoma, Arial, sans-serif; }
  .container { max-width: 560px; margin: 0 auto; padding: 24px 16px; }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #1e293b; }
  .header h2 { font-size: 18px; font-weight: 700; color: #1a365d; margin-bottom: 4px; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 1px 8px rgba(0,0,0,.06); padding: 20px 20px 16px; margin-bottom: 16px; }
  .section-title { margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #f1f5f9; }
  .section-title h3 { font-size: 16px; font-weight: 700; color: #1e293b; }
  .student-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #f8fafc; border-radius: 8px; margin-bottom: 8px; }
  .student-row .icon { font-size: 20px; }
  .student-row .name { font-weight: 600; font-size: 14px; color: #1e293b; }
  .student-row .class { font-size: 12px; color: #64748b; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: #475569; margin-bottom: 4px; }
  .field input { width: 100%; padding: 10px 12px; font-size: 15px; border: 1.5px solid #e2e8f0; border-radius: 10px; outline: none; background: #fafbfc; transition: border-color 0.2s; }
  .field input:focus { border-color: #3b82f6; background: #fff; }
  .submit-btn { width: 100%; padding: 14px 24px; font-size: 16px; font-weight: 700; color: #fff; background: #2563eb; border: none; border-radius: 12px; cursor: pointer; transition: background 0.2s; margin-bottom: 24px; }
  .submit-btn:hover { background: #1d4ed8; }
  .preview-badge { position: fixed; top: 0; left: 0; right: 0; background: #f59e0b; color: #fff; text-align: center; padding: 6px; font-size: 13px; font-weight: 600; z-index: 999; }
  .lang-toggle { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 600; color: #3b82f6; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
</style>
<script>
  function toggleLang() {
    const html = document.documentElement;
    const isAr = html.getAttribute('lang') === 'ar';
    html.setAttribute('lang', isAr ? 'en' : 'ar');
    html.setAttribute('dir', isAr ? 'ltr' : 'rtl');
    document.getElementById('langBtn').textContent = isAr ? 'العربية' : 'English';
    // Swap all translatable elements
    document.querySelectorAll('[data-en]').forEach(el => {
      const en = el.getAttribute('data-en');
      const ar = el.getAttribute('data-ar');
      el.textContent = isAr ? en : ar;
    });
  }
</script>
</head>
<body>

<div class="preview-badge">⚠ PREVIEW ONLY — This is a sample form layout (not functional)</div>

<div class="container" style="margin-top: 40px;">

  <!-- Language Toggle -->
  <div style="text-align: right; margin-bottom: 8px;">
    <button id="langBtn" class="lang-toggle" onclick="toggleLang()">العربية</button>
  </div>

  <!-- Header -->
  <div class="header">
    <img src="kis-logo.png" alt="KIS" style="height: 72px; margin: 0 auto 8px; display: block;" onerror="this.style.display='none'" />
    <h2 data-en="Khaled International Schools" data-ar="مدارس خالد العالمية">Khaled International Schools</h2>
    <h1 data-en="Update Contact Information" data-ar="تحديث بيانات التواصل">Update Contact Information</h1>
  </div>

  <!-- Students Card -->
  <div class="card">
    <div class="section-title">
      <h3 data-en="Students" data-ar="الطلاب">Students</h3>
    </div>
    <div class="student-row">
      <span class="icon">🎓</span>
      <div>
        <div class="name">أحمد محمد العبدالله</div>
        <div class="class">Grade 5</div>
      </div>
    </div>
    <div class="student-row">
      <span class="icon">🎓</span>
      <div>
        <div class="name">سارة محمد العبدالله</div>
        <div class="class">Grade 3</div>
      </div>
    </div>
  </div>

  <!-- Father Card -->
  <div class="card">
    <div class="section-title">
      <h3 data-en="Father Information" data-ar="بيانات الأب">Father Information</h3>
    </div>
    <div class="field">
      <label data-en="Mobile" data-ar="رقم الجوال">Mobile</label>
      <input type="tel" value="0501234567" dir="ltr" />
    </div>
    <div class="field">
      <label data-en="Email" data-ar="البريد الإلكتروني">Email</label>
      <input type="email" value="father@email.com" dir="ltr" />
    </div>
    <div class="field">
      <label data-en="Workplace" data-ar="جهة العمل">Workplace</label>
      <input type="text" value="Aramco" />
    </div>
  </div>

  <!-- Mother Card -->
  <div class="card">
    <div class="section-title">
      <h3 data-en="Mother Information" data-ar="بيانات الأم">Mother Information</h3>
    </div>
    <div class="field">
      <label data-en="Mobile" data-ar="رقم الجوال">Mobile</label>
      <input type="tel" value="0559876543" dir="ltr" />
    </div>
    <div class="field">
      <label data-en="Email" data-ar="البريد الإلكتروني">Email</label>
      <input type="email" value="mother@email.com" dir="ltr" />
    </div>
    <div class="field">
      <label data-en="Workplace" data-ar="جهة العمل">Workplace</label>
      <input type="text" value="" />
    </div>
  </div>

  <!-- Address Card -->
  <div class="card">
    <div class="section-title">
      <h3 data-en="Address" data-ar="العنوان">Address</h3>
    </div>
    <div class="field">
      <label data-en="City" data-ar="المدينة">City</label>
      <input type="text" value="Dhahran" />
    </div>
    <div class="field">
      <label data-en="District" data-ar="الحي">District</label>
      <input type="text" value="Al Doha" />
    </div>
    <div class="field">
      <label data-en="Street" data-ar="الشارع">Street</label>
      <input type="text" value="King Fahd Road" />
    </div>
  </div>

  <!-- Emergency Card -->
  <div class="card">
    <div class="section-title">
      <h3 data-en="Emergency Contact" data-ar="الطوارئ">Emergency Contact</h3>
    </div>
    <div class="field">
      <label data-en="Contact Name" data-ar="اسم جهة الاتصال">Contact Name</label>
      <input type="text" value="Khaled Al-Abdullah" />
    </div>
    <div class="field">
      <label data-en="Emergency Phone" data-ar="رقم الطوارئ">Emergency Phone</label>
      <input type="tel" value="0551112233" dir="ltr" />
    </div>
  </div>

  <!-- Submit Button -->
  <button class="submit-btn" data-en="Save Updates" data-ar="حفظ التحديثات">Save Updates</button>

</div>

</body>
</html>
